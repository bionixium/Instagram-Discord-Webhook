name: Instagram Monitor

on:
  schedule:
    - cron: '0 * * * *' # Vérification automatique toutes les heures
  workflow_dispatch: # Permet le lancement manuel avec le bouton

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          TIME_INTERVAL: '600'
        run: python bot.py
